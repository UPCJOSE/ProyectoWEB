<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Princpal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .naranja { color: #e67e22; }
        .azul { color: #3498db; }
        .verde { color: #2ecc71; }
        .borde { border: 1px solid #eaeaea; }
        .negro { color: #333; }
        .blanco { color: #ffffff}
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-black shadow-sm">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand ms-3 me-auto mb-0 h1" href="#">Dashboard</a>

        </div>
    </nav>

    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title" id="titulo">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">opcion 1</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">opcion 2</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">opcion 3</a>
                </li>
                <li class="nav-item dropdown" data-bs-theme="dark">
            <a class="nav-link dropdown-toggle" href="#" role="button" id="dropdownMenuButtonDark" data-bs-toggle="dropdown" aria-expanded="false">
              Dropdown
            </a>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButtonDark">
              <li><a class="dropdown-item" href="#">Action</a></li>
              <li><a class="dropdown-item" href="#">Another action</a></li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item" href="#">Something else here</a></li>
            </ul>
          </li>
            </ul>
        </div>
    </div>

    <div class="row mt-4 container-fluid">
        <div class="col-12">
            <h2 class="fw-bold text-dark">Bienvenido!</h2>
        </div>
    </div>

    <!-- paneles principales -->

    <div class="container-fluid mt-4">
        <div class="row">
            
            <div class="col-12 col-md-4 mb-3">
                <div class="card borde shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h6 class="text-secondary fw-semibold mb-1" style="letter-spacing: 0.5px;">PENDIENTES</h6>
                        <h2 class="naranja fw-bold mb-0">12</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4 mb-3">
                <div class="card borde shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h6 class="text-secondary fw-semibold mb-1" style="letter-spacing: 0.5px;">EN PROCESO</h6>
                        <h2 class="azul fw-bold mb-0">5</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4 mb-3">
                <div class="card borde shadow-sm rounded-4 h-100">
                    <div class="card-body p-4">
                        <h6 class="text-secondary fw-semibold mb-1" style="letter-spacing: 0.5px;">TERMINADOS</h6>
                        <h2 class="verde fw-bold mb-0">8</h2>
                    </div>
                </div>
            </div>
        </div> 
    </div>
    
            <!-- Tipos de prendas -->

    <div class="col-12">
        <div class="card borde shadow-sm rounded-4 h-100">
            <div class="card-body p-4">
            <h6 class="text-secondary fw-semibold mb-3 text-center" style="letter-spacing: .5px;">
                TIPOS DE PRENDAS
            </h6>

            <div class="container">
                <div class="row g-4 align-items-start justify-content-center">

                <!-- Camisetas -->
                <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Camisetas</div>
                    <button type="button" class="btn btn-light p-0 border-0 prenda-btn" aria-label="Abrir Camisetas">
                    <img
                        src="https://img.freepik.com/fotos-premium/closeup-camiseta-roja-blanco-espacio-vacio-tuyo-diseno-sobre-fondo-blanco-representacion-3d_476612-5218.jpg"
                        alt="Camisetas"
                        class="img-fluid prenda-img">
                    </button>
                </div>

                <!-- Pantalones -->
                <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Pantalones</div>
                    <button type="button" class="btn btn-light p-0 border-0 prenda-btn" aria-label="Abrir Pantalones">
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRP1AAtb3TL8z__Mvrmk8bkElsntbxRvnPQMw&s"
                        alt="Pantalones"
                        class="img-fluid prenda-img">
                    </button>
                </div>

                <!-- Blusas -->
                <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Blusas</div>
                    <button type="button" class="btn btn-light p-0 border-0 prenda-btn" aria-label="Abrir Blusas">
                    <img
                        src="https://thumbs.dreamstime.com/b/la-blusa-de-las-mujeres-se-a%C3%ADsla-en-el-fondo-blanco-25919099.jpg"
                        alt="Blusas"
                        class="img-fluid prenda-img">
                    </button>
                </div>

                <!-- Faldas -->
                <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Faldas</div>
                    <button type="button" class="btn btn-light p-0 border-0 prenda-btn" aria-label="Abrir Faldas">
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRx2cBYPy_xxoBdQmdHDmNxV3iYWhTs6bNOhg&s"
                        alt="Faldas"
                        class="img-fluid prenda-img">
                    </button>
                </div>

                </div>
            </div>
            </div>
        </div>
    </div>

        <!-- Estilos  -->
        <style>
        /* Imagen responsiva sin deformar */
        .prenda-img {
            max-height: 250px;    
            object-fit: contain;   /* evita deformación */
        }
        /* Boton plano */
        .prenda-btn {
            background: transparent;
            border-radius: .75rem;     
            transition: transform .12s ease, box-shadow .12s ease;
        }
        .prenda-btn:hover,
        .prenda-btn:focus {
            outline: none;
            box-shadow: 0 0 0 .15rem rgba(13,110,253,.15);
            transform: translateY(-1px);
            cursor: pointer;
        }
        </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
