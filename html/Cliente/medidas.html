<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Medidas - Elegancia y Estilo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/medidas.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top px-4 py-3">
        <div class="container-fluid max-w-7xl">
            <a class="navbar-brand fs-4 fw-bold" href="/html/Cliente/principal.html">Elegancia y Estilo</a>
            <div class="d-flex align-items-center gap-4 ms-auto">
                <a href="../Cliente/principal.html" class="text-secondary text-decoration-none">Dashboard</a>
                <a href="#" class="text-dark text-decoration-none fw-semibold border-bottom border-dark pb-1">Mis Medidas</a>
                <button class="btn p-0 border-0 position-relative" id="btnCarrito">
                    <i class="bi bi-bag fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-gold">2</span>
                </button>
                <a href="#" onclick="cerrarSesion()" class="text-decoration-none" title="Cerrar Sesión">
                    <div class="rounded-circle d-flex justify-content-center align-items-center shadow-sm" style="width: 40px; height: 40px; background-color: #181f21; color: white; font-weight: bold;">
                        CV
                    </div>
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5 max-w-7xl">
        <div class="mb-5 pb-4 border-bottom d-flex justify-content-between align-items-end">
            <div>
                <h6 class="text-uppercase text-gold fw-bold mb-2" style="letter-spacing: 2px;">Perfil Corporativo</h6>
                <h1 class="display-5 fw-bold mb-0">Mi Perfil de Medidas</h1>
            </div>
            <button class="btn btn-dark rounded-0 px-4 py-2 text-uppercase" style="letter-spacing: 1px; font-size: 0.8rem;">
                Solicitar Toma de Medidas
            </button>
        </div>

        <p class="lead text-muted mb-5">Estas medidas fueron tomadas por nuestro Maestro Sastre en su última visita y son la base para todas sus prendas "Bespoke" (A medida).</p>

        <div class="row g-4">
            <div class="col-md-3 col-6">
                <div class="card medida-card h-100 text-center p-4 shadow-sm hover-elevate">
                    <i class="bi bi-person-bounding-box fs-1 text-gold mb-3"></i>
                    <h6 class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Cuello</h6>
                    <h3 class="fw-bold mb-0">42 <span class="fs-6 text-muted">cm</span></h3>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card medida-card h-100 text-center p-4 shadow-sm">
                    <i class="bi bi-arrows-expand fs-1 text-gold mb-3"></i>
                    <h6 class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Pecho</h6>
                    <h3 class="fw-bold mb-0">105 <span class="fs-6 text-muted">cm</span></h3>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card medida-card h-100 text-center p-4 shadow-sm">
                    <i class="bi bi-arrows-collapse fs-1 text-gold mb-3"></i>
                    <h6 class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Cintura</h6>
                    <h3 class="fw-bold mb-0">88 <span class="fs-6 text-muted">cm</span></h3>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card medida-card h-100 text-center p-4 shadow-sm">
                    <i class="bi bi-rulers fs-1 text-gold mb-3"></i>
                    <h6 class="text-muted text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Largo Brazo</h6>
                    <h3 class="fw-bold mb-0">64.5 <span class="fs-6 text-muted">cm</span></h3>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/Navegacion.js"></script>
    <script>
        function cerrarSesion() {
            if(confirm("¿Estás seguro que deseas cerrar la sesión?")) {
                localStorage.clear();
                window.location.href = "/html/login.html"; 
            }
        }
    </script>
</body>
</html>
