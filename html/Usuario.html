<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/Usuario.css">
</head>

<body class="bg-gradient-custom min-vh-100 d-flex align-items-center justify-content-center p-3">
    <main class="w-100" style="max-width: 420px;">

        <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-dark mb-1">Ecomoda</h1>
            <p class="text-secondary">Gestión de sastrería</p>
        </div>

        <div class="glass-effect rounded-4 shadow-lg p-4 p-md-5">
            <form id="formLogin">
                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold text-dark" style="font-size: 0.9rem;">Correo
                        electrónico</label>
                    <input type="email" class="form-control form-control-lg fs-6" id="email"
                        placeholder="nombre@ejemplo.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label for="password" class="form-label fw-semibold text-dark mb-0"
                            style="font-size: 0.9rem;">Contraseña</label>
                    </div>
                    <input type="password" class="form-control form-control-lg fs-6" id="password"
                        placeholder="********" required>
                </div>

                <div class="mb-4">
                    <label for="role" class="form-label fw-semibold text-dark" style="font-size: 0.9rem;">Selecciona tu
                        Rol</label>
                    <select class="form-select form-select-lg fs-6" id="role" required>
                        <option value="sastre">Sastre</option>
                        <option value="recepcionista">Recepcionista</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>

                <div class="mt-4 pt-2">
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm btn-custom-login fs-6 py-3" id="btnLogin">
                        Iniciar Sesión
                    </button>
                </div>

                <div class="text-center mt-4">
                    <p class="text-secondary mb-0" style="font-size: 0.85rem;">
                        ¿No tienes acceso? <a href="#" class="text-primary fw-semibold text-decoration-none">Contacta al
                            administrador</a>
                    </p>
                </div>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/Usuario.js"></script>
</body>

</html>
