    <!-- paneles principales -->

    <div class="container-fluid mt-4">
      <div class="row">
        <div class="col-12 col-md-4 mb-3">
          <div class="card borde shadow-sm rounded-4 h-100">
            <div class="card-body p-4">
              <h6
                class="text-secondary fw-semibold mb-1"
                style="letter-spacing: 0.5px"
              >
                PENDIENTES
              </h6>
              <h2 class="naranja fw-bold mb-0">12</h2>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-4 mb-3">
          <div class="card borde shadow-sm rounded-4 h-100">

    <!-- Tipos de prendas -->

    <div class="container-fluid mt-4 mb-4">
      <div class="row">
        <div class="col-12">
          <div class="card borde shadow-sm rounded-4 h-100">
            <div class="card-body p-4">
              <h6
                class="text-secondary fw-semibold mb-3 text-center"
                style="letter-spacing: 0.5px"
              >
                TIPOS DE PRENDAS
              </h6>
              <div class="container">
                <div class="row g-4 align-items-start justify-content-center">
                  <!-- Camisetas -->
                  <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Camisetas</div>
                    <button
                      type="button"
                      class="btn btn-light p-0 border-0 prenda-btn"
                      aria-label="Abrir Camisetas"
                    >
                      <img
                        src="https://img.freepik.com/fotos-premium/closeup-camiseta-roja-blanco-espacio-vacio-tuyo-diseno-sobre-fondo-blanco-representacion-3d_476612-5218.jpg"
                        alt="Camisetas"
                        class="img-fluid prenda-img"
                      />
                    </button>
                  </div>
                  <!-- Pantalones -->
                  <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Pantalones</div>
                    <button
                      type="button"
                      class="btn btn-light p-0 border-0 prenda-btn"
                      aria-label="Abrir Pantalones"
                    >
                      <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRP1AAtb3TL8z__Mvrmk8bkElsntbxRvnPQMw&s"
                        alt="Pantalones"
                        class="img-fluid prenda-img"
                      />
                    </button>
                  </div>

                  <!-- Blusas -->
                  <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Blusas</div>
                    <button
                      type="button"
                      class="btn btn-light p-0 border-0 prenda-btn"
                      aria-label="Abrir Blusas"
                    >
                      <img
                        src="https://thumbs.dreamstime.com/b/la-blusa-de-las-mujeres-se-a%C3%ADsla-en-el-fondo-blanco-25919099.jpg"
                        alt="Blusas"
                        class="img-fluid prenda-img"
                      />
                    </button>
                  </div>

                  <!-- Faldas -->
                  <div class="col-6 col-md-3 text-center">
                    <div class="fw-semibold mb-2">Faldas</div>
                    <button
                      type="button"
                      class="btn btn-light p-0 border-0 prenda-btn"
                      aria-label="Abrir Faldas"
                    >
                      <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRx2cBYPy_xxoBdQmdHDmNxV3iYWhTs6bNOhg&s"
                        alt="Faldas"
                        class="img-fluid prenda-img"
                      />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
