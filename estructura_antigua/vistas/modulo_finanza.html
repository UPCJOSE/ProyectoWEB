<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Finanzas - Sastrería</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="/css/finanza.css">
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 sidebar">
        <h4>Sastrería</h4>
        <hr>
        <a href="/vistas/principal.html">Dashboard</a>
        <a href="#">Pedidos</a>
        <a href="#">Clientes</a>
        <a href="#">Finanzas</a>
        <a href="#">Reportes</a>
    </div>

    <!-- CONTENIDO -->
    <div class="col-md-10 p-4">

        <h2 class="mb-4">Finanzas</h2>

        <!-- CARDS -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card card-metric text-center">
                    <i class="fa fa-dollar-sign text-success metric-icon"></i>
                    <h5>Ingresos</h5>
                    <h3 id="ingresos">$0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-metric text-center">
                    <i class="fa fa-arrow-down text-danger metric-icon"></i>
                    <h5>Egresos</h5>
                    <h3 id="egresos">$0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-metric text-center">
                    <i class="fa fa-wallet text-primary metric-icon"></i>
                    <h5>Saldo</h5>
                    <h3 id="saldo">$0</h3>
                </div>
            </div>
        </div>

        <!-- PAGOS -->
        <div class="card p-3 mb-4">
            <div class="d-flex justify-content-between">
                <h5>Pagos (Ingresos)</h5>
                <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#modalPago">
                    + Registrar Pago
                </button>
            </div>

            <table class="table mt-3">
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Tipo</th>
                        <th>Monto</th>
                    </tr>
                </thead>
                <tbody id="tablaPagos"></tbody>
            </table>
        </div>

        <!-- EGRESOS -->
        <div class="card p-3 mb-4">
            <div class="d-flex justify-content-between">
                <h5>Egresos (Materiales)</h5>
                <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalEgreso">
                    + Registrar Egreso
                </button>
            </div>

            <table class="table mt-3">
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Cantidad</th>
                        <th>Costo</th>
                    </tr>
                </thead>
                <tbody id="tablaEgresos"></tbody>
            </table>
        </div>

        <!-- REPORTES -->
        <div class="card p-3">
            <h5>Reportes</h5>
            <div class="row mt-3">
                <div class="col-md-3">
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100">Exportar Excel</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-secondary w-100">Exportar PDF</button>
                </div>
            </div>
        </div>

    </div>
</div>
</div>

<!-- MODAL PAGO -->
<div class="modal fade" id="modalPago">
<div class="modal-dialog">
<div class="modal-content">
    <div class="modal-header">
        <h5>Registrar Pago</h5>
    </div>
    <div class="modal-body">
        <input type="text" id="pedidoPago" class="form-control mb-2" placeholder="Pedido">
        <select id="tipoPago" class="form-control mb-2">
            <option>Adelanto</option>
            <option>Saldo</option>
        </select>
        <input type="number" id="montoPago" class="form-control" placeholder="Monto">
    </div>
    <div class="modal-footer">
        <button class="btn btn-success" onclick="guardarPago()">Guardar</button>
    </div>
</div>
</div>
</div>

<!-- MODAL EGRESO -->
<div class="modal fade" id="modalEgreso">
<div class="modal-dialog">
<div class="modal-content">
    <div class="modal-header">
        <h5>Registrar Egreso</h5>
    </div>
    <div class="modal-body">
        <input type="text" id="material" class="form-control mb-2" placeholder="Material">
        <input type="number" id="cantidad" class="form-control mb-2" placeholder="Cantidad">
        <input type="number" id="costo" class="form-control" placeholder="Costo">
    </div>
    <div class="modal-footer">
        <button class="btn btn-danger" onclick="guardarEgreso()">Guardar</button>
    </div>
</div>
</div>
</div>

<script>
let pagos = [];
let egresos = [];

function actualizar() {
    let ingresos = pagos.reduce((a,b)=>a+b.monto,0);
    let gastos = egresos.reduce((a,b)=>a+b.costo,0);

    document.getElementById("ingresos").innerText = "$"+ingresos;
    document.getElementById("egresos").innerText = "$"+gastos;
    document.getElementById("saldo").innerText = "$"+(ingresos-gastos);
}

function guardarPago() {
    let p = document.getElementById("pedidoPago").value;
    let t = document.getElementById("tipoPago").value;
    let m = parseFloat(document.getElementById("montoPago").value);

    pagos.push({pedido:p, tipo:t, monto:m});

    document.getElementById("tablaPagos").innerHTML += `
        <tr>
            <td>${p}</td>
            <td>${t}</td>
            <td>$${m}</td>
        </tr>
    `;

    actualizar();
}

function guardarEgreso() {
    let mat = document.getElementById("material").value;
    let cant = document.getElementById("cantidad").value;
    let cost = parseFloat(document.getElementById("costo").value);

    egresos.push({material:mat, cantidad:cant, costo:cost});

    document.getElementById("tablaEgresos").innerHTML += `
        <tr>
            <td>${mat}</td>
            <td>${cant}</td>
            <td>$${cost}</td>
        </tr>
    `;

    actualizar();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
```
